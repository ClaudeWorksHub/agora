name: Publish to Marketplace

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agora
        uses: actions/checkout@v4

      - name: Extract version and SHA
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${GITHUB_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${VERSION} (${SHA})"

      - name: Validate version matches plugin.json
        run: |
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$PLUGIN_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.meta.outputs.version }}) does not match plugin.json version (${PLUGIN_VERSION})"
            exit 1
          fi

      - name: Update marketplace index
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MARKETPLACE_TOKEN }}
          script: |
            const owner = 'ClaudeWorksHub';
            const repo = 'claude-plugins';
            const path = '.claude-plugin/marketplace.json';
            const version = '${{ steps.meta.outputs.version }}';
            const sha = '${{ steps.meta.outputs.sha }}';

            // Read current marketplace.json
            const { data: file } = await github.rest.repos.getContent({
              owner, repo, path
            });
            const content = JSON.parse(Buffer.from(file.content, 'base64').toString());

            // Update agora plugin entry
            const plugin = content.plugins.find(p => p.name === 'agora');
            if (!plugin) throw new Error('agora plugin not found in marketplace.json');
            plugin.version = version;
            plugin.source.sha = sha;

            // Write back
            const newContent = Buffer.from(JSON.stringify(content, null, 2) + '\n').toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update agora plugin to v${version}`,
              content: newContent,
              sha: file.sha
            });

            core.info(`Updated marketplace: agora v${version} (${sha})`);
